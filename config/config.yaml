# Self-Agent 配置文件
# 配置Deepseek API和服务器设置

# Deepseek API配置
deepseek:
  api_key: ""  # 替换为您的Deepseek API密钥
  max_tokens: 120000  # 最大token数

# 服务器配置
server:
  port: 19100  # 服务端口，默认19100
  max_tokens: 1000 # 最大token数

# 日志配置
logging:
  level: "info"  # 日志级别: debug, info, warn, error
  format: "json"  # 日志格式: text, json

# 飞书机器人配置（可选）
channel:
  feishu:
    default_webhook: ""  # 默认飞书机器人webhook地址
    default_secret: ""    # 默认飞书机器人secret
    app_id: "" # 飞书机器人app_id
    open_id: "" # 飞书用户自己的open_id